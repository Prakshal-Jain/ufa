<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  @font-face { font-family: "Inter"; src: url("__FONT__") format("woff2"); font-weight: 100 900; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px; overflow: hidden;
    font-family: "Inter", -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #f7f7f4; text-align: center;
    background:
      radial-gradient(120% 80% at 50% 50%, rgba(8,8,8,0.0) 0%, rgba(8,8,8,0.55) 78%, rgba(8,8,8,0.85) 100%),
      linear-gradient(180deg, rgba(8,8,8,0.74) 0%, rgba(8,8,8,0.40) 42%, rgba(8,8,8,0.9) 100%),
      url("file:///Users/prakshaljain/OS-1/ufa/public/media/hero.jpg");
    background-size: cover; background-position: center;
    display: flex; flex-direction: column; justify-content: space-between; align-items: center;
    padding: 84px 76px 76px;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  .kicker { display: inline-flex; align-items: center; gap: 15px; font-size: 21px;
    font-weight: 700; letter-spacing: 6px; text-transform: uppercase; color: #ff4b4b; }
  .kicker .dot { width: 13px; height: 13px; border-radius: 50%; background: #ff3636;
    box-shadow: 0 0 20px 3px rgba(255,54,54,0.75); }
  .mid { display: flex; flex-direction: column; align-items: center; gap: 30px; }
  .word { font-weight: 900; font-size: 360px; line-height: 0.8; letter-spacing: -16px;
    color: #fff; text-shadow: 0 10px 70px rgba(0,0,0,0.55); }
  .subline { display: flex; align-items: center; gap: 22px; width: 780px; }
  .subline .bar { flex: 1; height: 2px; background: linear-gradient(90deg, transparent, #ff3636); }
  .subline .bar.r { background: linear-gradient(90deg, #ff3636, transparent); }
  .subline span { font-weight: 800; font-size: 27px; letter-spacing: 7px; text-transform: uppercase; white-space: nowrap; }
  .tag { max-width: 22ch; font-size: 31px; line-height: 1.42; color: #d8d8d4; }
  .tag b { color: #fff; font-weight: 700; }
  .bot { display: flex; flex-direction: column; align-items: center; gap: 26px; }
  .facts { display: flex; align-items: center; gap: 18px; font-size: 20px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase; color: #cfcfca; }
  .facts i { width: 6px; height: 6px; border-radius: 50%; background: #ff3636; }
  .foot { font-size: 23px; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; }
  .foot .v { color: #9a9a96; font-weight: 600; font-size: 18px; letter-spacing: 3px; margin-top: 9px; }
</style>
</head>
<body>
  <div class="kicker"><span class="dot"></span>Live AI Competition &nbsp;·&nbsp; San Francisco</div>
  <div class="mid">
    <div class="word">UFA</div>
    <div class="subline"><span class="bar"></span><span>Ultimate Fighting Agents</span><span class="bar r"></span></div>
    <div class="tag">The world&apos;s first live arena where AI agents <b>break into each other</b> for real money.</div>
  </div>
  <div class="bot">
    <div class="facts"><span>Cash Prize + Credits</span><i></i><span>Live</span><i></i><span>Any Model</span></div>
    <div class="foot">Frontier Tower &nbsp;·&nbsp; San Francisco<div class="v">ufa.foundation</div></div>
  </div>
</body>
</html>
