name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # External trigger for near-instant rebuilds. Have Zapier/Make POST to the
  # GitHub repository_dispatch API with event_type "luma-update" when a Luma
  # event changes, and the site redeploys within minutes.
  repository_dispatch:
    types: [luma-update]
  # Hourly rebuild so Luma event dates stay current (static export bakes them in).
  schedule:
    - cron: "0 * * * *"

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; cancel in-progress runs of older commits.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Google Calendar secret iCal URL. Set in repo
          # Settings → Secrets and variables → Actions.
          GCAL_ICS_URL: ${{ secrets.GCAL_ICS_URL }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
